{% extends 'admin_panel/base_admin.html' %}
{% load static %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="form-card">
    <h5 class="mb-4">
        <i class="fas {% if direction.id %}fa-edit{% else %}fa-plus{% endif %} me-2" style="color: #4361ee;"></i>
        {{ title }}
    </h5>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Yo'nalish nomi <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" value="{{ direction.name }}" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label">Yo'nalish kodi <span class="text-danger">*</span></label>
                <input type="text" name="code" class="form-control" value="{{ direction.code }}" required>
                <div class="form-text">Masalan: MED-001, TIB-2024</div>
            </div>
            
            <div class="col-12 mb-3">
                <label class="form-label">Tavsif</label>
                <textarea name="description" class="form-control" rows="3">{{ direction.description }}</textarea>
            </div>
            
            <div class="col-12 mb-4">
                <div class="form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="is_active" 
                           {% if direction.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">
                        Aktiv yo'nalish
                    </label>
                </div>
            </div>
            
            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Saqlash
                </button>
                <a href="{% url 'custom_admin:directions' %}" class="btn btn-secondary">
                    <i class="fas fa-times me-2"></i>Bekor qilish
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
