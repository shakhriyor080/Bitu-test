{% extends 'admin_panel/base_admin.html' %}
{% load static %}

{% block page_title %}Yo'nalishni o'chirish{% endblock %}

{% block content %}
<div class="form-card text-center">
    <div class="mb-4">
        <i class="fas fa-exclamation-triangle fa-4x" style="color: #ef476f;"></i>
    </div>
    
    <h4 class="mb-3">Diqqat!</h4>
    
    <p class="mb-4">
        Siz <strong>"{{ direction.name }}"</strong> yo'nalishini o'chirmoqchisiz.<br>
        Bu amalni ortga qaytarib bo'lmaydi!
    </p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i class="fas fa-trash me-2"></i>Ha, o'chirish
        </button>
        <a href="{% url 'custom_admin:directions' %}" class="btn btn-secondary">
            <i class="fas fa-times me-2"></i>Bekor qilish
        </a>
    </form>
</div>
{% endblock %}
