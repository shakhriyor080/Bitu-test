{% extends 'admin_panel/base_admin.html' %}
{% load static %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="form-card">
    <h5 class="mb-4">
        <i class="fas {% if question.id %}fa-edit{% else %}fa-plus{% endif %} me-2" style="color: #4361ee;"></i>
        {{ title }}
    </h5>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Yo'nalish <span class="text-danger">*</span></label>
            <select name="direction" class="form-select" required>
                <option value="">-- Yo'nalishni tanlang --</option>
                {% for d in directions %}
                    <option value="{{ d.id }}" {% if question.direction_id == d.id %}selected{% endif %}>
                        {{ d.name }}
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Savol matni <span class="text-danger">*</span></label>
            <textarea name="text" class="form-control" rows="3" required>{{ question.text }}</textarea>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">A variant <span class="text-danger">*</span></label>
                <input type="text" name="option_a" class="form-control" value="{{ question.option_a }}" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label">B variant <span class="text-danger">*</span></label>
                <input type="text" name="option_b" class="form-control" value="{{ question.option_b }}" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label">C variant <span class="text-danger">*</span></label>
                <input type="text" name="option_c" class="form-control" value="{{ question.option_c }}" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label">D variant <span class="text-danger">*</span></label>
                <input type="text" name="option_d" class="form-control" value="{{ question.option_d }}" required>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">To'g'ri javob <span class="text-danger">*</span></label>
                <select name="correct_answer" class="form-select" required>
                    <option value="">-- Tanlang --</option>
                    <option value="A" {% if question.correct_answer == 'A' %}selected{% endif %}>A</option>
                    <option value="B" {% if question.correct_answer == 'B' %}selected{% endif %}>B</option>
                    <option value="C" {% if question.correct_answer == 'C' %}selected{% endif %}>C</option>
                    <option value="D" {% if question.correct_answer == 'D' %}selected{% endif %}>D</option>
                </select>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label">Izoh (ixtiyoriy)</label>
                <textarea name="explanation" class="form-control" rows="2">{{ question.explanation }}</textarea>
            </div>
        </div>
        
        <div class="mb-4">
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="is_active" 
                       {% if question.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">
                    Aktiv savol
                </label>
            </div>
        </div>
        
        <div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>Saqlash
            </button>
            <a href="{% url 'custom_admin:questions' %}" class="btn btn-secondary">
                <i class="fas fa-times me-2"></i>Bekor qilish
            </a>
        </div>
    </form>
</div>
{% endblock %}
